services:
  - type: web
    name: tespet-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-render.txt
    startCommand: bash start.sh
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PORT
        value: 8000
